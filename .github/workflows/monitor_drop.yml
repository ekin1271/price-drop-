name: Price Drop Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# 🔥 KRİTİK: aynı anda 2 run olmasın
concurrency:
  group: price-drop-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları yükle
        run: npm install

      # 🔥 EN ÖNEMLİ FIX: önce güncel state'i çek
      - name: Latest state çek
        run: |
          git pull origin main --rebase

      - name: Scripti çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
        run: node price_drop_monitor.js

      - name: State dosyasını kaydet ve push et
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add drop_state.json
          git diff --staged --quiet || git commit -m "state güncellendi"

          # 🔥 SAFE PUSH (rebase yok, overwrite yok)
          git push origin main
